name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        version: [25.12.5]
        target: [ipq40xx/generic, mediatek/mt7622, ramips/mt7620, ramips/mt7621, ramips/mt76x8, x86/64]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        run: sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget zstd
      - run: ./openwrt-${{ matrix.version }}-fullcone.sh ${{ matrix.target }}
      - id: rename-target
        run: echo "name=${{ matrix.target }}" | tr / _ >> $GITHUB_OUTPUT
      - name: Collect packages
        run: |
          shopt -s nullglob
          cd openwrt-${{ matrix.version }}
          cp -v \
            bin/packages/*/base/firewall4*.[ia]pk \
            bin/packages/*/base/libnftnl*.[ia]pk \
            bin/packages/*/base/nftables*.[ia]pk \
            bin/packages/*/luci/luci-base*.[ia]pk \
            bin/packages/*/luci/luci-app-firewall*.[ia]pk \
            bin/targets/*/*/packages/kmod-nft-fullcone*.[ia]pk \
            ..
          cd ..
          NAME=nft-fullcone-${{ matrix.version }}-${{ steps.rename-target.outputs.name }}.tar
          tar --owner=0 --group=0 --numeric-owner -H v7 -cf ${NAME} *.ipk *.apk
      - uses: actions/upload-artifact@v4
        with:
          name: nft-fullcone-pkgs-${{ matrix.version }}-${{ steps.rename-target.outputs.name }}
          path: |
            *.ipk
            *.apk
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: '*.tar'
